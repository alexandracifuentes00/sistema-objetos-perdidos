<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objeto no encontrado</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            font-family:'Segoe UI',sans-serif;
        }

        .contenedor{
            max-width:700px;
            margin:60px auto;
        }

        .card{
            border:none;
            border-radius:20px;
            box-shadow:0 8px 20px rgba(0,0,0,.08);
        }

        .card-header{
            background:#dc3545;
            color:white;
            text-align:center;
            padding:25px;
        }

        .card-body{
            padding:40px;
            text-align:center;
        }

        .icono{
            font-size:80px;
            color:#dc3545;
            margin-bottom:20px;
        }

        .termino{
            color:#002060;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="contenedor">

    <div class="card">

        <div class="card-header">
            <h2>
                <i class="fas fa-circle-xmark"></i>
                Objeto no encontrado
            </h2>
        </div>

        <div class="card-body">

            <div class="icono">
                <i class="fas fa-search"></i>
            </div>

            <h4>No encontramos resultados.</h4>

            <p>
                No existe ningún objeto registrado con el nombre:
            </p>

            <h3 class="termino">
                "{{ termino }}"
            </h3>

            <hr>

            <p class="text-muted">
                Intenta buscar con otro nombre o consulta en Administración.
            </p>

            <div class="d-flex justify-content-center gap-3 mt-4">

                <a href="{{ url_for('buscar_objeto') }}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left me-2"></i>
                    Buscar nuevamente
                </a>

                <a href="{{ url_for('principal') }}" class="btn btn-primary">
                    <i class="fas fa-house me-2"></i>
                    Menú principal
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
