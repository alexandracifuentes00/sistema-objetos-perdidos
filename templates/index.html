<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - Módulo Inteligente</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
    html, body {
        height: 100vh;
        width: 100vw;
        margin: 0 !important;
        padding: 0 !important;
        background: white !important;
        font-family: 'Segoe UI', sans-serif;
        overflow: hidden;
    }

    .full-page-viewport {
        width: 100% !important;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .header-full {
        background: #002060;
        color: white;
        padding: 35px 20px;
        text-align: center;
        width: 100% !important;
    }

    /* TAMAÑO DEL LOGO EN CANDIDATO A MÁS GRANDE */
    .logo-pc { 
        width: 100%;
        max-width: 280px; /* Aumentado para que resalte mucho más */
        height: auto;
        margin-bottom: 15px; 
    }
    
    .content-full {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px;
        background: white !important;
    }

    .btn-ingresar-pc {
        width: 100%;
        max-width: 450px;
        background: #005694;
        border: none;
        color: white !important;
        padding: 22px;
        border-radius: 15px;
        font-size: 1.5rem;
        font-weight: 700;
        text-decoration: none;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0, 86, 148, 0.4);
        transition: .3s ease;
    }
    .btn-ingresar-pc:hover { 
        background: #00467a; 
        transform: translateY(-3px); 
    }

    .footer-full { 
        background: #002060 !important;
        color: white !important; 
        text-align: center; 
        padding: 20px; 
        font-size: .9rem; 
        font-weight: 600;
        width: 100% !important;
    }
</style>
</head>
<body>

<div class="full-page-viewport">
    <header class="header-full">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo CFT Tarapacá" class="logo-pc">
        <h1 class="fw-bold m-0 text-white fs-2">MÓDULO INTELIGENTE</h1>
    </header>

    <div class="content-full">
        <h2 class="fw-bold text-dark mb-3 fs-1">¡Bienvenido!</h2>
        <p class="text-muted fs-4 mb-5 text-center">Sistema Inteligente de Gestión y Consulta de Objetos Perdidos</p>
        
        <a href="{{ url_for('principal') }}" class="btn-ingresar-pc">
            <i class="fas fa-right-to-bracket me-2"></i>INGRESAR AL MÓDULO
        </a>
    </div>

    <footer class="footer-full">
        © 2026 Centro de Formación Técnica Tarapacá. Todos los derechos reservados.
    </footer>
</div>

</body>
</html>
