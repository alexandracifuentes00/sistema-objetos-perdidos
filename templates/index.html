<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - Módulo Inteligente</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
    html, body {
        height: 100vh;
        width: 100vw;
        margin: 0;
        padding: 0;
        background: #002060 !important;
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .main-box-pc {
        width: 90% !important;
        max-width: 1100px !important;
        height: 80vh;
        background: white !important;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,.4);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow: hidden;
    }

    .header-pc {
        background: #002060;
        color: white;
        padding: 40px 20px;
        text-align: center;
    }

    .logo-pc { 
        max-width: 180px; 
        height: auto;
        margin-bottom: 20px; 
    }
    
    .content-pc {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px;
    }

    .btn-ingresar-pc {
        width: 100%;
        max-width: 450px;
        background: #005694;
        border: none;
        color: white !important;
        padding: 22px;
        border-radius: 15px;
        font-size: 1.5rem;
        font-weight: 700;
        text-decoration: none;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0, 86, 148, 0.4);
        transition: .3s ease;
    }
    .btn-ingresar-pc:hover { 
        background: #00467a; 
        transform: translateY(-3px); 
    }

    .footer-pc { 
        background: #f1f5f9;
        color: #334155; 
        text-align: center; 
        padding: 15px; 
        font-size: .9rem; 
        font-weight: 600;
        border-top: 1px solid #e2e8f0;
    }
</style>
</head>
<body>

<div class="main-box-pc">
    <header class="header-pc">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo CFT Tarapacá" class="logo-pc">
        <h1 class="fw-bold m-0 text-white">MÓDULO INTELIGENTE</h1>
    </header>

    <div class="content-pc">
        <h2 class="fw-bold text-dark mb-3 fs-1">¡Bienvenido!</h2>
        <p class="text-muted fs-4 mb-5 text-center">Sistema Inteligente de Gestión y Consulta de Objetos Perdidos</p>
        
        <a href="{{ url_for('principal') }}" class="btn-ingresar-pc shadow">
            <i class="fas fa-right-to-bracket me-2"></i>INGRESAR AL MÓDULO
        </a>
    </div>

    <footer class="footer-pc">
        © 2026 Centro de Formación Técnica Tarapacá. Todos los derechos reservados.
    </footer>
</div>

</body>
</html>
