<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - Módulo Inteligente</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        height: 100%;
        width: 100% !important;
        max-width: 100% !important;
        margin: 0;
        padding: 0;
        background: #002060 !important; /* Fondo azul completo en PC */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* CONTENEDOR EXPANDIDO PARA PC */
    .totem-container {
        width: 90% !important;
        max-width: 1200px !important; /* Se vuelve gigante y centrado en PC */
        height: 80vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,.3);
        overflow: hidden;
    }

    .header {
        background: #002060;
        color: white;
        padding: 40px;
        text-align: center;
    }
    .logo { max-width: 180px; margin-bottom: 20px; }
    
    .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px;
    }

    .btn-ingresar {
        width: 100%;
        max-width: 400px;
        background: #005694;
        border: none;
        color: white;
        padding: 20px;
        border-radius: 12px;
        font-size: 1.4rem;
        font-weight: 700;
        text-decoration: none;
        text-align: center;
        transition: .3s;
    }
    .btn-ingresar:hover { background: #00467a; color: white; transform: translateY(-2px); }

    .footer { 
        background: #002060;
        color: white; 
        text-align: center; 
        padding: 15px; 
        font-size: .9rem; 
    }
</style>
</head>
<body>

<div class="totem-container">
    <header class="header text-center py-4">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo CFT Tarapacá" class="logo">
        <h1 class="fw-bold text-white">MÓDULO INTELIGENTE</h1>
    </header>

    <div class="content">
        <h2 class="fw-bold text-dark mb-3">¡Bienvenido!</h2>
        <p class="welcome-text text-muted fs-5 mb-4 text-center">Sistema Inteligente de Gestión y Consulta de Objetos Perdidos</p>
        <a href="{{ url_for('principal') }}" class="btn-ingresar shadow">
            <i class="fas fa-right-to-bracket me-2"></i>INGRESAR AL MÓDULO
        </a>
    </div>

    <footer class="footer">
        © 2026 Centro de Formación Técnica Tarapacá. Todos los derechos reservados.
    </footer>
</div>

</body>
</html>
