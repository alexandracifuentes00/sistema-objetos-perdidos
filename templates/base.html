<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block titulo %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        html, body {
            width: 100% !important;
            max-width: 100% !important;
            margin: 0;
            padding: 0;
            background-color: #f0f4f8 !important;
        }

        /* FORZAR PANTALLA COMPLETA EN EL CONTENEDOR */
        .totem-container {
            width: 100% !important;
            max-width: 100% !important; /* Rompe los 500px/600px anteriores */
            min-height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: none !important;
        }

        .container {
            max-width: 100% !important;
            width: 100% !important;
        }

        /* Ajuste para que los formularios e items ocupen el ancho de la PC */
        .main-content, .form-card {
            width: 100% !important;
            max-width: 1200px !important; /* Ancho ideal de lectura en PC */
            margin: 0 auto !important;
            padding: 20px !important;
        }

        .btn-menu {
            padding: 25px !important;
            font-size: 1.4rem !important;
        }
    </style>
    {% block estilos %}{% endblock %}
</head>
<body>

    {% block contenido %}{% endblock %}

</body>
</html>
