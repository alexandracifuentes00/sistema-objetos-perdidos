<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Objeto - CFT Tarapacá</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

<style>
    html, body {
        height: 100vh;
        width: 100vw;
        margin: 0 !important;
        padding: 0 !important;
        background: white !important;
        font-family: 'Segoe UI', sans-serif;
        overflow: hidden;
    }

    .full-page-viewport {
        width: 100% !important;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    /* MODIFICACIÓN: Cabecera con posición relativa y altura controlada para centrar el módulo */
    .header-full {
        background: #002060;
        color: white;
        padding: 15px 20px;
        display: flex;
        align-items: center;
        position: relative;
        min-height: 90px;
        width: 100% !important;
    }

    .header-full img { 
        height: 55px; 
        background: white; 
        padding: 4px; 
        border-radius: 8px;
        position: relative;
        z-index: 2; /* Mantiene el logo en primer plano */
    }

    /* Contenedor del título perfectamente centrado en el medio */
    .header-text-center {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        width: 100%;
        padding-left: 90px;
        padding-right: 20px;
        z-index: 1;
    }

    .header-text-center h1 { font-size: 1.2rem; font-weight: 700; margin: 0; text-transform: uppercase; }
    .header-text-center p { margin: 0; color: #93c5fd; font-size: .75rem; text-transform: uppercase; margin-top: 1px; }

    .form-container-full {
        flex: 1;
        display: flex;
        flex-direction: column; /* Permite colocar el h2 arriba del form de manera limpia */
        justify-content: center;
        align-items: center;
        padding: 40px;
        background: white !important;
    }

    .form-wrapper-inner {
        width: 100%;
        max-width: 550px;
    }

    .btn-buscar-pc {
        background-color: #16a34a !important;
        border: none !important;
        color: white !important;
        padding: 18px !important;
        font-size: 1.3rem !important;
        transition: .3s;
    }
    .btn-buscar-pc:hover { 
        background-color: #15803d !important; 
        transform: translateY(-2px);
    }

    /* BARRA INFERIOR AZUL INSTITUCIONAL */
    .footer-full {
        background-color: #002060 !important;
        padding: 20px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100% !important;
        color: white !important;
    }
    
    .nav-home-pc { 
        color: white !important; 
        font-weight: 700; 
        text-decoration: none; 
        font-size: 1.1rem;
    }
</style>
</head>
<body>

<div class="full-page-viewport">
    
    <header class="header-full">
        <img src="{{ url_for('static', filename='logo.png') }}" 
            alt="Logo CFT Tarapacá" 
            style="height: 70px; background: white; padding: 6px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); position: relative; z-index: 2;">
        <div class="header-text-center">
            <h1>Módulo Inteligente</h1>
            <p>Sistema de Gestión de Objetos Perdidos</p>
        </div>
    </header>

    <main class="form-container-full">
        
        <h2 class="text-center fw-bold mb-4" style="color: #002060; font-size: 1.6rem; text-transform: uppercase; letter-spacing: 0.5px;">
            <i class="fas fa-search me-2"></i>Buscar Objeto
        </h2>

        <div class="form-wrapper-inner">
            <form action="{{ url_for('buscar_objeto') }}" method="POST">
                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary fs-5 mb-2">Nombre del objeto que busca</label>
                    <input type="text" name="nombre" class="form-control form-control-lg py-3" placeholder="Ej: mochila, llaves, pendrive..." maxlength="80" required autocomplete="off">
                </div>

                <div class="d-grid gap-3">
                    <button type="submit" class="btn btn-buscar-pc fw-bold rounded-3 shadow">
                        <i class="fas fa-search me-2"></i>BUSCAR AHORA
                    </button>
                    <a href="{{ url_for('principal') }}" class="btn btn-outline-secondary py-3 fw-semibold">
                        <i class="fas fa-arrow-left me-2"></i>REGRESAR AL MENÚ
                    </a>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer-full">
        <a href="{{ url_for('index') }}" class="nav-home-pc"><i class="fas fa-home me-1"></i> INICIO</a>
        <div><i class="fas fa-info-circle fs-4" style="color: white;"></i></div>
    </footer>
</div>

</body>
</html>
