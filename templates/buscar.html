<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Objeto - CFT Tarapacá</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #002060 !important;
        font-family: 'Segoe UI', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* CONTENEDOR DE BÚSQUEDA ANCHO PC */
    .totem-container {
        width: 90% !important;
        max-width: 1000px !important; /* Expandido para PC horizontal */
        background: white;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        box-shadow: 0 10px 30px rgba(0,0,0,.25);
        overflow: hidden;
        height: 75vh;
    }

    .header-bar {
        background: #002060;
        color: white;
        padding: 30px;
        text-align: center;
    }

    .form-card {
        padding: 40px;
        max-width: 600px;
        margin: 0 auto;
        width: 100%;
    }

    .btn-buscar {
        background-color: #16a34a;
        color: white;
        padding: 15px;
        font-size: 1.2rem;
    }
    .btn-buscar:hover { background-color: #15803d; color: white; }

    .footer-bar {
        background-color: #e2e8f0;
        padding: 20px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .nav-home { color: #002060 !important; font-weight: 700; text-decoration: none; }
</style>
</head>
<body>

<div class="totem-container">
    <header class="header-bar">
        <h2 class="m-0 fw-bold"><i class="fas fa-search me-2"></i>BUSCAR OBJETO</h2>
    </header>

    <main class="form-card">
        <form action=\"{{ url_for('buscar_objeto') }}\" method=\"POST\">
            <div class=\"mb-4\">
                <label class=\"form-label fw-bold text-secondary fs-5\">Nombre del objeto que busca</label>
                <input type=\"text\" name=\"nombre\" class=\"form-control form-control-lg\" placeholder=\"Ej: mochila, llaves, pendrive...\" maxlength=\"80\" required autocomplete=\"off\">
            </div>

            <div class=\"d-grid gap-3\">
                <button type=\"submit\" class=\"btn btn-buscar fw-bold rounded-3 shadow-sm\">
                    <i class=\"fas fa-search me-2\"></i>BUSCAR NOW
                </button>
                <a href=\"{{ url_for('principal') }}\" class=\"btn btn-outline-secondary py-3 fw-semibold\">
                    <i class=\"fas fa-arrow-left me-2\"></i>REGRESAR AL MENÚ
                </a>
            </div>
        </form>
    </main>

    <footer class=\"footer-bar\">
        <a href=\"{{ url_for('index') }}\" class=\"nav-home\"><i class=\"fas fa-home\"></i> INICIO</a>
        <div><i class=\"fas fa-info-circle fs-5\" style=\"color: #002060;\"></i></div>
    </footer>
</div>

</body>
</html>
