<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

<link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        .modo-btn{
            position:fixed;
            left:15px;
            bottom:20px;
            background:#334155;
            color:white;
            text-decoration:none;
            padding:12px 18px;
            border-radius:10px;
            font-weight:600;
            box-shadow:0 4px 12px rgba(0,0,0,.2);
            z-index:9999;
        }

        .modo-btn:hover{
            background:#1e293b;
            color:white;
        }

    </style>

    {% block estilos %}{% endblock %}
</head>

<body>

    <!-- BOTÓN CAMBIAR MODO -->
    {% if modo_pc %}
        <a href="{{ url_for('activar_totem') }}" class="modo-btn">
            📱 Modo Tótem
        </a>
    {% else %}
        <a href="{{ url_for('activar_pc') }}" class="modo-btn">
            🖥️ Modo PC
        </a>
    {% endif %}

    {% block contenido %}
    {% endblock %}

</body>
</html>
