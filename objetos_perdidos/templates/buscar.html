<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Objeto - CFT Tarapacá</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #002060; /* Deja el color fijo aquí */
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
}

   .nav-home {
    color: white !important;
    text-decoration: none !important; /* Esto borra cualquier subrayado */
    border-bottom: none !important;    /* Esto asegura que no haya línea inferior */
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 0;                /* Asegura que no haya espacio extra */
}

/* Opcional: Si quieres que siga cambiando de color al pasar el mouse */
.nav-home:hover {
    text-decoration: none !important;
    opacity: 0.8;
}
    .info-icon { width: 28px; height: 28px; border-radius: 50%; background: white; color: #002060; display: flex; align-items: center; justify-content: center; font-weight: bold; }


    .totem-container {
        width: 100%; max-width: 500px; height: 100vh; background: white;
        display: flex; flex-direction: column; box-shadow: 0 0 25px rgba(0,0,0,.15);
        margin: 0 auto;
    }

    /* HEADER FIJO */
    .header-bar { 
        flex: 0 0 auto; /* No crece ni se encoge */
        background: #002060; color: white; padding: 15px 20px; 
        display: flex; align-items: center; gap: 15px; 
    }
    .header-bar img { height: 50px; background: white; padding: 4px; border-radius: 8px; }
    .header-text h1 { font-size: 1.1rem; font-weight: 700; }
    .header-text p { font-size: 0.7rem; color: #93c5fd; }

    /* CONTENIDO CENTRAL (El corazón del problema) */
    .main-content { 
        flex: 1; /* Ocupa solo el espacio restante disponible */
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 20px;
        overflow-y: auto; /* Si el contenido es muy grande, hace scroll interno aquí */
    }
    
    .titulo-busqueda { color: #002060; font-weight: 800; margin-bottom: 20px; font-size: 1.5rem; text-align: center; }
    .form-card { background: #f8fafc; border-radius: 15px; padding: 25px; box-shadow: 0 4px 12px rgba(0,0,0,.08); width: 100%; max-width: 450px; }
    
    /* FOOTER FIJO */
    .footer-bar { flex: 0 0 auto; background: #002060; height: 55px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
    
    /* AJUSTES MODO PC */
    .totem-container.modo-pc { max-width: 100vw !important; width: 100vw !important; }
    .totem-container.modo-pc .header-bar { padding: 20px 40px; height: 100px; }
    .totem-container.modo-pc .header-bar img { height: 70px; }
    .totem-container.modo-pc .header-text h1 { font-size: 2rem; }
    .totem-container.modo-pc .titulo-busqueda { font-size: 2.5rem; }
    .totem-container.modo-pc .form-card { max-width: 550px; padding: 40px; }
    .modo-btn { position: fixed; left: 15px; bottom: 70px; background: #334155; color: white; padding: 10px; border-radius: 8px; z-index: 9999; }
    
</style>
</head>
<body style="background: {% if modo_pc %}#002060{% else %}#e2e8f0{% endif %};">

<div class="totem-container {% if modo_pc %}modo-pc{% endif %}">

    <header class="header-bar">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
        <div class="header-text">
            <h1>MÓDULO INTELIGENTE</h1>
            <p>SISTEMA DE GESTIÓN DE OBJETOS PERDIDOS</p>
        </div>
    </header>

    <main class="main-content">
        <div class="text-center mb-3">
            <h2 class="titulo-busqueda">
                <i class="fas fa-search me-2"></i>BUSCAR OBJETO
            </h2>
        </div>

        <div class="form-card">
            <form action="{{ url_for('buscar_objeto') }}" method="POST">
                <div class="mb-4">
                    <label class="form-label">Nombre del objeto que busca</label>
                    <input 
                        type="text" 
                        name="nombre" 
                        class="form-control" 
                        placeholder="Ej: mochila, llaves, pendrive..." 
                        required 
                        autocomplete="off">
                </div>

                <div class="d-grid gap-3">
                    <button type="submit" class="btn btn-buscar fw-bold shadow-sm">
                        <i class="fas fa-search me-2"></i>BUSCAR
                    </button>
                    
                    <a href="{{ url_for('principal') }}" class="btn btn-outline-secondary py-3 fw-semibold">
                        <i class="fas fa-arrow-left me-2"></i>REGRESAR AL MENÚ
                    </a>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer-bar">
        <a href="{{ url_for('index') }}" class="nav-home"><i class="fas fa-home"></i> INICIO</a>
        <div class="info-icon"><i class="fas fa-info-circle" style="color: #002060;"></i></div>
    </footer>

</div>

{% if modo_pc %}
    <a href="{{ url_for('activar_totem') }}" class="modo-btn">
        <i class="fas fa-mobile-alt me-1"></i> Modo Tótem
    </a>
{% else %}
    <a href="{{ url_for('activar_pc') }}" class="modo-btn">
        <i class="fas fa-desktop me-1"></i> Modo PC
    </a>
{% endif %}

</body>
</html>
